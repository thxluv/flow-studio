# Render.com Blueprint — FlowPhoto
# https://dashboard.render.com/ → New → Blueprint
#
# Starter + disk: данные в /data сохраняются между рестартами.
# Free без диска: данные эфемерны — только R2-бэкап (см. README).
services:
  - type: web
    name: flowphoto
    runtime: docker
    dockerfilePath: ./flowphoto-server/Dockerfile
    dockerContext: ./flowphoto-server
    plan: starter
    healthCheckPath: /health
    disk:
      name: flowphoto-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: FLOWPHOTO_DATA_DIR
        value: /data
      - key: FLOWNOTE_PUBLIC_URL
        value: https://thxluv.github.io/flow-studio/index.html
      - key: FLOWPHOTO_MAX_STORAGE_BYTES
        value: "524288000"
      - key: FLOWPHOTO_RATE_MAX
        value: "60"
      - key: FLOWPHOTO_RATE_WINDOW
        value: "60"
      - key: PORT
        value: "8000"
      # FLOWPHOTO_VAULT_SECRET — только в Dashboard (Secret), ≥32 символов. Не в git!
      # Опционально R2 (бесплатный тариф Cloudflare — страховка / Free-tier persistence):
      # FLOWPHOTO_BACKUP_BUCKET, FLOWPHOTO_BACKUP_ACCESS_KEY, FLOWPHOTO_BACKUP_SECRET_KEY
      # FLOWPHOTO_BACKUP_ENDPOINT — https://<accountid>.r2.cloudflarestorage.com
      # FLOWPHOTO_BACKUP_PREFIX — flowphoto