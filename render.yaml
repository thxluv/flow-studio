# Render.com Blueprint — FlowPhoto (Free + Storj S3)
# https://dashboard.render.com/
#
# Free: диск эфемерный. Постоянство — бэкап SQLite в Storj + restore при рестарте.
# Пошаговая настройка: archive/STORJ-FREE-RENDER.md
services:
  - type: web
    name: flowphoto
    runtime: docker
    dockerfilePath: ./flowphoto-server/Dockerfile
    dockerContext: ./flowphoto-server
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLOWPHOTO_DATA_DIR
        value: /data
      - key: FLOWNOTE_PUBLIC_URL
        value: https://thxluv.github.io/flow-studio/index.html
      - key: FLOWPHOTO_MAX_STORAGE_BYTES
        value: "524288000"
      - key: FLOWPHOTO_RATE_MAX
        value: "60"
      - key: FLOWPHOTO_RATE_WINDOW
        value: "60"
      - key: FLOWPHOTO_BACKUP_INTERVAL
        value: "1800"
      - key: FLOWPHOTO_BACKUP_KEEP
        value: "12"
      - key: PORT
        value: "8000"
      # Dashboard → Secret:
      # FLOWPHOTO_VAULT_SECRET (≥32 символов)
      # Dashboard → Secret (после Storj S3 Credentials):
      # FLOWPHOTO_BACKUP_BUCKET, FLOWPHOTO_BACKUP_ACCESS_KEY, FLOWPHOTO_BACKUP_SECRET_KEY
      # FLOWPHOTO_BACKUP_ENDPOINT = https://gateway.storjshare.io
      # FLOWPHOTO_BACKUP_PREFIX = flowphoto
      # FLOWPHOTO_BACKUP_INTERVAL = 1800, FLOWPHOTO_BACKUP_KEEP = 12