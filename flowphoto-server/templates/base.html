<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}FlowPhoto{% endblock %}</title>
    <meta name="description" content="FlowPhoto — приватный обмен фото. Шифрование в браузере, сервер хранит только ciphertext.">
    <meta name="theme-color" content="#06060b">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #06060b;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 58, 237, 0.12), transparent);
            color: #e2e8f0;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.9375rem;
            line-height: 1.55;
        }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.02em; }
        .fp-page-title { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; font-size: 1.5rem; line-height: 1.2; letter-spacing: -0.02em; color: #f1f5f9; }
        @media (min-width: 640px) { .fp-page-title { font-size: 1.875rem; } }
        .fp-page-lead { font-size: 0.875rem; color: #94a3b8; line-height: 1.6; max-width: 36rem; }
        .fp-section-title { font-size: 0.875rem; font-weight: 600; color: #e2e8f0; display: flex; align-items: center; gap: 0.4rem; }
        .fp-label { display: block; font-size: 0.75rem; font-weight: 500; color: #c4b5fd; margin-bottom: 0.375rem; }
        .fp-hint { font-size: 0.8125rem; color: #64748b; line-height: 1.55; }
        .fp-card { border: 1px solid rgba(76, 29, 149, 0.35); background: rgba(0, 0, 0, 0.32); border-radius: 1rem; }
        .fp-callout { border-radius: 0.875rem; padding: 0.75rem 1rem; font-size: 0.8125rem; line-height: 1.55; }
        .fp-callout-info { border: 1px solid rgba(139, 92, 246, 0.28); background: rgba(76, 29, 149, 0.15); color: #c4b5fd; }
        .fp-callout-warn { border: 1px solid rgba(245, 158, 11, 0.32); background: rgba(120, 53, 15, 0.18); color: #fde68a; }
        .fp-callout-ok { border: 1px solid rgba(16, 185, 129, 0.32); background: rgba(6, 78, 59, 0.2); color: #a7f3d0; }
        .fp-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .fp-step { border: 1px solid rgba(139, 92, 246, 0.18); background: rgba(0,0,0,0.25); border-radius: 0.75rem; padding: 0.65rem 0.4rem; text-align: center; }
        .fp-step-num { display: inline-flex; width: 1.25rem; height: 1.25rem; align-items: center; justify-content: center; border-radius: 999px; background: rgba(124,58,237,0.25); color: #c4b5fd; font-size: 0.65rem; font-weight: 600; margin-bottom: 0.25rem; }
        .fp-step-text { font-size: 0.65rem; color: #94a3b8; line-height: 1.35; }
        .fp-modal-panel { border-radius: 1.25rem; border: 1px solid rgba(139, 92, 246, 0.28); background: #0a0a12; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.65); }
        .fp-modal-title { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; font-size: 1.125rem; color: #ede9fe; }
        .fp-modal-lead { font-size: 0.8125rem; color: #94a3b8; line-height: 1.55; margin-top: 0.5rem; }
        .fp-code { font-family: ui-monospace, monospace; font-size: 0.85em; color: #c4b5fd; background: rgba(124,58,237,0.12); padding: 0.1em 0.35em; border-radius: 0.35rem; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        .fp-glass { background: rgba(12, 12, 20, 0.88); backdrop-filter: blur(12px); }
        .fp-btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            transition: transform 0.1s, box-shadow 0.15s;
            min-height: 44px;
        }
        .fp-btn-primary:hover:not(:disabled) { box-shadow: 0 0 24px rgba(139, 92, 246, 0.35); }
        .fp-btn-primary:active:not(:disabled) { transform: scale(0.98); }
        .fp-btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
        .fp-btn-secondary {
            min-height: 44px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            background: rgba(139, 92, 246, 0.08);
            transition: all 0.15s;
        }
        .fp-btn-secondary:hover { background: rgba(139, 92, 246, 0.16); }
        .fp-drop { border: 1px dashed rgba(139, 92, 246, 0.35); transition: all 0.2s; min-height: 120px; }
        .fp-drop:hover, .fp-drop.dragover {
            border-color: rgba(139, 92, 246, 0.65);
            background: rgba(139, 92, 246, 0.06);
        }
        .fp-retention-chip {
            border: 1px solid rgba(139, 92, 246, 0.22);
            background: rgba(12, 12, 20, 0.6);
            color: #94a3b8;
            transition: all 0.15s;
            min-height: 36px;
        }
        .fp-retention-chip:hover {
            border-color: rgba(139, 92, 246, 0.45);
            color: #c4b5fd;
            background: rgba(139, 92, 246, 0.08);
        }
        .fp-retention-chip.active {
            border-color: rgba(139, 92, 246, 0.7);
            background: rgba(139, 92, 246, 0.18);
            color: #e9d5ff;
            box-shadow: 0 0 18px rgba(139, 92, 246, 0.15);
        }
        .fp-retention-custom {
            border: 1px solid rgba(139, 92, 246, 0.22);
            background: rgba(12, 12, 20, 0.6);
            transition: all 0.15s;
        }
        .fp-retention-custom.active {
            border-color: rgba(139, 92, 246, 0.55);
            background: rgba(139, 92, 246, 0.08);
        }
        .fp-retention-input, .fp-text-input {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: #e2e8f0;
            min-height: 40px;
        }
        .fp-retention-input:focus, .fp-text-input:focus {
            outline: none;
            border-color: rgba(139, 92, 246, 0.55);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.12);
        }
        .fp-toggle {
            width: 42px; height: 24px; border-radius: 999px;
            background: rgba(100, 116, 139, 0.35);
            position: relative; cursor: pointer; transition: background 0.2s;
            flex-shrink: 0;
        }
        .fp-toggle.on { background: rgba(124, 58, 237, 0.55); }
        .fp-toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 18px; height: 18px; border-radius: 50%; background: #fff;
            transition: transform 0.2s;
        }
        .fp-toggle.on::after { transform: translateX(18px); }
        .fp-nav-link { color: #94a3b8; transition: color 0.15s; min-height: 36px; display: flex; align-items: center; }
        .fp-nav-link:hover, .fp-nav-link.active { color: #c4b5fd; }
        .fp-vault-check {
            width: 18px; height: 18px; accent-color: #7c3aed;
            cursor: pointer; flex-shrink: 0;
        }
        .fp-vault-card.selected {
            border-color: rgba(139, 92, 246, 0.55);
            background: rgba(139, 92, 246, 0.08);
        }
        .fp-danger-zone {
            border: 1px solid rgba(239, 68, 68, 0.25);
            background: rgba(127, 29, 29, 0.08);
        }
        .fp-nav-vault { padding-left: 0.35rem; padding-right: 0.35rem; }
        .fp-nav-vault-icon {
            width: 2.25rem; height: 2.25rem; border-radius: 0.65rem;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }
        .fp-nav-vault.active .fp-nav-vault-icon,
        .fp-nav-vault-icon.active {
            background: rgba(91, 33, 182, 0.35);
            border-color: rgba(139, 92, 246, 0.35);
        }
        @media (min-width: 640px) {
            .fp-nav-vault { padding-left: 0.625rem; padding-right: 0.625rem; }
            .fp-nav-vault-icon {
                width: auto; height: auto; border: none; background: transparent !important;
            }
        }
        .fp-vault-panel {
            border: 1px solid rgba(76, 29, 149, 0.35);
            background: rgba(0, 0, 0, 0.28);
            border-radius: 1rem;
            overflow: hidden;
        }
        .fp-vault-panel > summary {
            list-style: none;
            cursor: pointer;
            padding: 0.85rem 1rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            min-height: 44px;
            user-select: none;
        }
        .fp-vault-panel > summary::-webkit-details-marker { display: none; }
        .fp-vault-panel > summary::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 0.65rem;
            color: #64748b;
            transition: transform 0.2s;
        }
        .fp-vault-panel[open] > summary::after { transform: rotate(180deg); }
        .fp-vault-panel-body { padding: 0 1rem 1rem; }
        .fp-vault-panel-danger { border-color: rgba(239, 68, 68, 0.22); }
        .fp-vault-panel-danger > summary { color: #fca5a5; }
        .fp-vault-badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.25rem 0.55rem; border-radius: 999px;
            font-size: 0.65rem; font-weight: 500; letter-spacing: 0.02em;
        }
        .fp-vault-badge-owner {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.35);
            color: #ddd6fe;
        }
        .fp-vault-badge-foreign {
            background: rgba(180, 83, 9, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d;
        }
        .fp-vault-badge-neutral {
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid rgba(100, 116, 139, 0.35);
            color: #94a3b8;
        }
        @media (max-width: 640px) {
            main { padding-bottom: 2rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="relative">
    <nav class="border-b border-violet-950/80 fp-glass sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
            <a href="/" class="flex items-center gap-2.5 min-w-0 group shrink-0">
                <div class="w-9 h-9 rounded-xl bg-violet-600/20 border border-violet-500/30 flex items-center justify-center">
                    <i class="fa-solid fa-eye-low-vision text-violet-400 text-sm"></i>
                </div>
                <div class="min-w-0 hidden xs:block sm:block">
                    <div class="font-display text-base sm:text-lg tracking-tight leading-none group-hover:text-violet-200 transition-colors">FlowPhoto</div>
                    <div class="text-[9px] text-violet-400/60 font-mono tracking-widest mt-0.5">E2E · AES-GCM</div>
                </div>
            </a>
            <div class="flex items-center gap-1 sm:gap-3 text-xs">
                <a href="/" class="fp-nav-link px-2.5 py-1.5 rounded-lg {% if active_nav == 'upload' %}active bg-violet-900/25{% endif %}">
                    <i class="fa-solid fa-cloud-arrow-up sm:mr-1"></i><span class="hidden sm:inline">Загрузить</span>
                </a>
                <a href="/vault" class="fp-nav-link fp-nav-vault rounded-lg {% if active_nav == 'vault' %}active{% endif %}" title="FlowVault — личный сейф фото">
                    <span class="fp-nav-vault-icon {% if active_nav == 'vault' %}active{% endif %}">
                        <i class="fa-solid fa-vault text-violet-400 text-sm sm:text-xs sm:mr-1"></i>
                    </span>
                    <span class="hidden sm:inline font-display tracking-tight ml-0 sm:ml-0">Flow<span class="text-violet-300">Vault</span></span>
                </a>
                <a href="{{ flownote_url | default('https://thxluv.github.io/flow-studio/index.html') }}" class="fp-nav-link px-2.5 py-1.5 rounded-lg text-slate-500 hover:text-slate-300" title="FlowNote Studio — отдельный сервис">
                    <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-3xl mx-auto px-4 pb-10 pt-2 text-center space-y-2">
        <p class="text-[10px] text-slate-600 font-mono tracking-wide">ZERO-KNOWLEDGE · КЛЮЧ ТОЛЬКО В # ССЫЛКИ</p>
        <p class="text-[11px] text-slate-500">
            <a href="https://thxluv.github.io/flow-studio/privacy.html" class="text-violet-400/80 hover:text-violet-300 no-underline">Конфиденциальность</a>
            <span class="text-slate-700 mx-1.5">·</span>
            <a href="https://thxluv.github.io/flow-studio/terms.html" class="text-violet-400/80 hover:text-violet-300 no-underline">Условия</a>
            <span class="text-slate-700 mx-1.5">·</span>
            <a href="https://thxluv.github.io/flow-studio/index.html" class="text-slate-500 hover:text-slate-400 no-underline">FlowNote</a>
        </p>
    </footer>

    <div id="fp-toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-2xl bg-slate-950/95 border border-violet-500/45 text-sm text-violet-50 shadow-2xl max-w-[min(90vw,22rem)] text-center backdrop-blur-sm"></div>

    <script>
        function showToast(msg) {
            const el = document.getElementById('fp-toast');
            if (!el) return;
            el.textContent = msg;
            el.classList.remove('hidden');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => el.classList.add('hidden'), 2800);
        }
        function fpToggle(el) {
            el.classList.toggle('on');
            return el.classList.contains('on');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
