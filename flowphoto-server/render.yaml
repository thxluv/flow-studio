# Render.com — деплой FlowPhoto в интернет (бесплатный старт)
# Dashboard → New → Blueprint → подключи репозиторий flow-studio
services:
  - type: web
    name: flowphoto
    runtime: docker
    dockerfilePath: ./flowphoto-server/Dockerfile
    dockerContext: ./flowphoto-server
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLOWPHOTO_DATA_DIR
        value: /data
      - key: FLOWNOTE_PUBLIC_URL
        value: https://thxluv.github.io/flow-studio/index.html
      - key: PORT
        value: "8000"