# Render.com — FlowPhoto (flowphoto-server/)
services:
  - type: web
    name: flowphoto
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLOWPHOTO_DATA_DIR
        value: /data
      - key: FLOWNOTE_PUBLIC_URL
        value: https://thxluv.github.io/flow-studio/index.html
      - key: FLOWPHOTO_MAX_STORAGE_BYTES
        value: "524288000"
      - key: PORT
        value: "8000"