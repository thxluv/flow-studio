<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowPhoto — переход на сервер</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; background: #06060b; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    </style>
</head>
<body>
    <div class="max-w-md w-full border border-violet-900/50 rounded-2xl p-8 text-center bg-violet-950/20">
        <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-violet-600/20 flex items-center justify-center">
            <i class="fa-solid fa-eye-low-vision text-violet-400 text-2xl"></i>
        </div>
        <h1 class="text-xl font-semibold mb-2">FlowPhoto 2.0</h1>
        <p class="text-sm text-slate-400 mb-6 leading-relaxed">
            FlowPhoto теперь работает как серверное приложение (FastAPI).
            Запусти <strong class="text-violet-300">start-flowphoto.bat</strong> на ноуте, затем открой приложение.
        </p>
        <a id="fp-link" href="http://127.0.0.1:8000/"
           class="inline-block w-full py-3 rounded-xl bg-violet-600 hover:bg-violet-500 text-white text-sm font-semibold transition-colors mb-3">
            Открыть FlowPhoto
        </a>
        <a href="index.html" class="text-xs text-slate-500 hover:text-violet-300">← FlowNote Studio</a>
        <p id="fp-status" class="text-[10px] text-slate-600 mt-4 font-mono"></p>
    </div>
    <script>
        const API = 'http://127.0.0.1:8000/health';
        fetch(API).then(r => r.ok ? r.json() : Promise.reject()).then(() => {
            document.getElementById('fp-status').textContent = 'Сервер запущен — перенаправление…';
            setTimeout(() => { location.href = 'http://127.0.0.1:8000/'; }, 600);
        }).catch(() => {
            document.getElementById('fp-status').textContent = 'Сервер не запущен. Запусти start-flowphoto.bat';
        });
    </script>
</body>
</html>
