<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowPhoto — переход</title>
    <meta http-equiv="refresh" content="2;url=https://flowphoto.onrender.com/">
    <script src="flow-config.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #06060b; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .box { text-align: center; padding: 2rem; }
        a { color: #a78bfa; }
    </style>
</head>
<body>
    <div class="box">
        <p>Открываем FlowPhoto…</p>
        <p><a id="fp-link" href="https://flowphoto.onrender.com/">https://flowphoto.onrender.com</a></p>
    </div>
    <script>
        const LOCAL = 'http://127.0.0.1:8000';
        const FALLBACK = 'https://flowphoto.onrender.com';

        function redirect(url) {
            const u = url.replace(/\/$/, '') + '/';
            document.getElementById('fp-link').href = u;
            location.replace(u);
        }

        function onConfig(cfg) {
            const publicUrl = cfg?.flowPhotoUrl || FALLBACK;
            const onGithub = location.hostname.includes('github.io');
            if (!onGithub) {
                fetch(LOCAL + '/health', { mode: 'cors' })
                    .then((r) => (r.ok ? redirect(LOCAL) : redirect(publicUrl)))
                    .catch(() => redirect(publicUrl));
            } else {
                redirect(publicUrl);
            }
        }

        document.addEventListener('flow-config-ready', (e) => onConfig(e.detail));
        if (window.FLOW_CONFIG?.flowPhotoUrl) onConfig(window.FLOW_CONFIG);
    </script>
</body>
</html>
